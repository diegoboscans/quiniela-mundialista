<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiniela Mundialista</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.2.3/css/flag-icons.min.css"/>
    <style> #barra-inferior { display: none; } </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen flex flex-col">

    <header class="bg-slate-800 border-b border-slate-700 p-4 sticky top-0 z-50">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black text-amber-500">QUINIELA 2026</h1>
            <div id="caja-usuario" class="bg-slate-900 px-3 py-1 rounded-full border border-slate-700 invisible">
                <span id="texto-usuario" class="text-xs font-medium text-slate-300"></span>
            </div>
        </div>
    </header>

    <main class="max-w-md w-full mx-auto p-4 flex-grow pb-24">
        <section id="vista-pronosticos" class="hidden space-y-4">
            <div id="contenedor-partidos" class="space-y-4"></div>
            <button id="btn-finalizar-jornada" onclick="finalizarYGuardarJornadaServer()" class="w-full bg-amber-500 text-slate-900 font-black py-3 rounded-xl">Guardar Quiniela</button>
        </section>

        <section id="vista-ranking" class="hidden">
            <table class="w-full text-left">
                <tbody id="tabla-ranking-cuerpo"></tbody>
            </table>
        </section>
    </main>

    <script>
        const API_BASE_URL = 'https://quiniela-mundialista-d7b8.onrender.com/api';
        let usuarioLogueado = JSON.parse(localStorage.getItem('quiniela_sesion_server')) || null;
        let pronosticosTemporales = {};

        function renderizarTarjetasPartidos(partidos) {
            const contenedor = document.getElementById('contenedor-partidos');
            contenedor.innerHTML = '';
            partidos.forEach(partido => {
                const pId = partido.id;
                const apuesta = pronosticosTemporales[pId] || { home: '', away: '' };
                const terminado = partido.status === 'FINISHED';
                const div = document.createElement('div');
                div.className = "bg-slate-800 border border-slate-700 p-4 rounded-xl";
                div.innerHTML = `
                    <div class="flex justify-between items-center">
                        <span class="text-xs font-bold w-20 truncate">${partido.homeTeam.name}</span>
                        <div class="flex gap-2">
                            <input type="number" min="0" ${terminado ? 'disabled' : ''} value="${apuesta.home}" oninput="pronosticosTemporales[${pId}]={...pronosticosTemporales[${pId}], home:this.value}" class="w-10 bg-slate-900 text-center rounded text-amber-500">
                            <input type="number" min="0" ${terminado ? 'disabled' : ''} value="${apuesta.away}" oninput="pronosticosTemporales[${pId}]={...pronosticosTemporales[${pId}], away:this.value}" class="w-10 bg-slate-900 text-center rounded text-amber-500">
                        </div>
                        <span class="text-xs font-bold w-20 truncate text-right">${partido.awayTeam.name}</span>
                    </div>`;
                contenedor.appendChild(div);
            });
        }

        async function renderizarRanking() {
            const tbody = document.getElementById('tabla-ranking-cuerpo');
            const res = await fetch(`${API_BASE_URL}/ranking`);
            const data = await res.json();
            tbody.innerHTML = data.sort((a,b) => b.puntos - a.puntos).map((u, i) => `
                <tr class="border-b border-slate-700">
                    <td class="py-3 px-4">${i+1}º</td>
                    <td class="py-3 px-2">${u.nombre}</td>
                    <td class="py-3 px-4 text-center font-black text-amber-500">${u.puntos} pts</td>
                </tr>`).join('');
        }
        
        function cambiarVista(vista) {
            document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
            document.getElementById('vista-' + vista).classList.remove('hidden');
            if(vista === 'ranking') renderizarRanking();
        }
    </script>
</body>
</html>
