<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiniela Mundialista</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.2.3/css/flag-icons.min.css"/>
    <style> #barra-inferior { display: none; } </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen flex flex-col justify-between">

    <header class="bg-slate-800 border-b border-slate-700 p-4 sticky top-0 z-50 shadow-md">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black tracking-wider text-amber-500"><i class="fa-solid fa-trophy mr-2"></i>QUINIELA 2026</h1>
        </div>
    </header>

    <main class="max-w-md w-full mx-auto p-4 flex-grow space-y-6 pb-24">
        <section id="vista-login" class="space-y-6 bg-slate-800 p-6 rounded-2xl border border-slate-700">
            <h2 class="text-2xl font-black text-amber-500 text-center">¡Bienvenido!</h2>
            <form onsubmit="procesarLogin(event);" class="space-y-4">
                <input type="text" id="login-username" required placeholder="Usuario" class="w-full bg-slate-900 border border-slate-700 rounded-xl py-3 px-4">
                <input type="password" id="login-password" required placeholder="Contraseña" class="w-full bg-slate-900 border border-slate-700 rounded-xl py-3 px-4">
                <button type="submit" class="w-full bg-amber-500 text-slate-900 font-bold py-3 rounded-xl">Ingresar</button>
            </form>
            <div class="flex flex-col text-center space-y-2 text-xs">
                <button onclick="cambiarVista('registro')" class="text-amber-500 underline">¿No tienes cuenta?</button>
                <button onclick="cambiarVista('recuperar')" class="text-slate-400 underline">¿Olvidaste tu contraseña?</button>
            </div>
        </section>

        <section id="vista-registro" class="hidden space-y-6 bg-slate-800 p-6 rounded-2xl border border-slate-700">
            <h2 class="text-2xl font-black text-amber-500 text-center">Crear Cuenta</h2>
            <form onsubmit="procesarRegistro(event);" class="space-y-4">
                <input type="text" id="reg-nombre" placeholder="Nombre" class="w-full bg-slate-900 border border-slate-700 rounded-xl py-3 px-4">
                <input type="text" id="reg-username" placeholder="Usuario" class="w-full bg-slate-900 border border-slate-700 rounded-xl py-3 px-4">
                <input type="password" id="reg-password" placeholder="Contraseña" class="w-full bg-slate-900 border border-slate-700 rounded-xl py-3 px-4">
                <button type="submit" class="w-full bg-emerald-500 text-white font-bold py-3 rounded-xl">Registrarse</button>
            </form>
            <button onclick="cambiarVista('login')" class="w-full text-xs text-amber-500 underline">Volver</button>
        </section>

        <section id="vista-recuperar" class="hidden space-y-6 bg-slate-800 p-6 rounded-2xl border border-slate-700">
            <h2 class="text-2xl font-black text-amber-500 text-center">Recuperar Clave</h2>
            <form onsubmit="procesarRecuperacionLocal(event);" class="space-y-4">
                <input type="text" id="rec-username" required placeholder="Usuario" class="w-full bg-slate-900 border border-slate-700 rounded-xl py-3 px-4">
                <input type="password" id="rec-password" required placeholder="Nueva Contraseña" class="w-full bg-slate-900 border border-slate-700 rounded-xl py-3 px-4">
                <button type="submit" class="w-full bg-amber-500 text-slate-900 font-bold py-3 rounded-xl">Actualizar</button>
            </form>
            <button onclick="cambiarVista('login')" class="w-full text-xs text-slate-400 underline">Volver al Login</button>
        </section>

        <section id="vista-pronosticos" class="hidden space-y-4">
            <h2 class="font-bold text-lg text-amber-500">Partidos</h2>
            <div id="contenedor-partidos" class="space-y-3"></div>
            <button onclick="finalizarYGuardarJornadaServer()" class="w-full bg-amber-500 text-slate-900 font-bold py-3 rounded-xl">Guardar Quiniela</button>
        </section>

        <section id="vista-ranking" class="hidden space-y-4">
            <h2 class="font-bold text-lg text-amber-500">Ranking</h2>
            <div id="tabla-ranking-cuerpo" class="bg-slate-800 rounded-xl p-4 divide-y divide-slate-700"></div>
            <button onclick="cambiarVista('app')" class="w-full bg-slate-700 py-2 rounded-xl">Volver</button>
        </section>
    </main>

 <nav id="barra-inferior" class="bg-slate-800 border-t border-slate-700 fixed bottom-0 left-0 right-0 p-4 z-50">
    <div class="max-w-md mx-auto flex justify-center gap-16 items-center">
        <button onclick="cambiarVista('app')" class="flex flex-col items-center text-slate-400 hover:text-amber-500 transition-colors">
            <i class="fa-solid fa-gamepad text-2xl"></i>
            <span class="text-[10px] mt-1 font-semibold uppercase">Partidos</span>
        </button>
        
        <button onclick="cambiarVista('ranking')" class="flex flex-col items-center text-slate-400 hover:text-amber-500 transition-colors">
            <i class="fa-solid fa-ranking-star text-2xl"></i>
            <span class="text-[10px] mt-1 font-semibold uppercase">Ranking</span>
        </button>
        
        <button onclick="cerrarSesion()" class="flex flex-col items-center text-slate-400 hover:text-red-400 transition-colors">
            <i class="fa-solid fa-right-from-bracket text-2xl"></i>
            <span class="text-[10px] mt-1 font-semibold uppercase">Salir</span>
        </button>
    </div>
</nav>

   <script>
    const API_BASE_URL = 'https://quiniela-mundialista-d7b8.onrender.com/api';
    let usuarioLogueado = JSON.parse(localStorage.getItem('quiniela_sesion_server')) || null;
    let pronosticosTemporales = {};

    function cambiarVista(vista) {
        document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
        const bar = document.getElementById('barra-inferior');
        if(vista === 'app') {
            document.getElementById('vista-pronosticos').classList.remove('hidden');
            bar.style.display = 'flex';
            cargarPartidosReales();
        } else if(vista === 'ranking') {
            document.getElementById('vista-ranking').classList.remove('hidden');
            bar.style.display = 'flex';
            renderizarRanking();
        } else {
            document.getElementById('vista-' + vista).classList.remove('hidden');
            bar.style.display = 'none';
        }
    }

    function registrarCambioTemporal(pId, lado, val) {
        if(!pronosticosTemporales[pId]) pronosticosTemporales[pId] = {home:'', away:''};
        pronosticosTemporales[pId][lado] = val;
    }

    async function cargarPartidosReales() {
        const cont = document.getElementById('contenedor-partidos');
        try {
            const res = await fetch(`${API_BASE_URL}/partidos`);
            const partidos = await res.json();
            renderizarTarjetasPartidos(partidos);
        } catch(e) { cont.innerHTML = "Error al cargar partidos."; }
    }

    function renderizarTarjetasPartidos(partidos) {
        const cont = document.getElementById('contenedor-partidos');
        cont.innerHTML = partidos.map(p => {
            const esFinalizado = p.status === 'FINISHED';
            const resReal = p.score_real || {home: null, away: null};
            const apuesta = pronosticosTemporales[p.id] || {home: '', away: ''};
            
            return `
                <div class="bg-slate-800 p-4 rounded-xl border ${esFinalizado ? 'border-emerald-500/50' : 'border-slate-700'} flex justify-between items-center">
                    <span class="w-20 truncate text-xs"><span class="fi fi-${p.homeTeam.flag}"></span> ${p.homeTeam.name}</span>
                    <div class="flex gap-2 items-center">
                        <input type="number" ${esFinalizado ? 'disabled' : ''} 
                            class="w-10 bg-slate-900 text-center rounded ${esFinalizado ? 'text-emerald-400' : ''}" 
                            value="${esFinalizado ? (resReal.home ?? '-') : apuesta.home}" 
                            oninput="registrarCambioTemporal('${p.id}', 'home', this.value)">
                        <span class="text-slate-600 font-bold">X</span>
                        <input type="number" ${esFinalizado ? 'disabled' : ''} 
                            class="w-10 bg-slate-900 text-center rounded ${esFinalizado ? 'text-emerald-400' : ''}" 
                            value="${esFinalizado ? (resReal.away ?? '-') : apuesta.away}" 
                            oninput="registrarCambioTemporal('${p.id}', 'away', this.value)">
                    </div>
                    <span class="w-20 truncate text-xs text-right">${p.awayTeam.name} <span class="fi fi-${p.awayTeam.flag}"></span></span>
                </div>`;
        }).join('');
    }

    async function finalizarYGuardarJornadaServer() {
        if(!usuarioLogueado) return;
        const res = await fetch(`${API_BASE_URL}/guardar_quiniela`, {
            method: 'POST', 
            headers: {'Content-Type': 'application/json'}, 
            body: JSON.stringify({username: usuarioLogueado.username, pronosticos: pronosticosTemporales})
        });
        if((await res.json()).success) alert("Guardado correctamente");
    }

    async function procesarLogin(e) {
        e.preventDefault();
        const u = document.getElementById('login-username').value.toLowerCase();
        const p = document.getElementById('login-password').value;
        const res = await fetch(`${API_BASE_URL}/login`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u, password:p})});
        const data = await res.json();
        if(data.success) {
            usuarioLogueado = data.user;
            pronosticosTemporales = data.user.pronosticos || {};
            localStorage.setItem('quiniela_sesion_server', JSON.stringify(usuarioLogueado));
            cambiarVista('app');
        } else alert("Error de credenciales");
    }

    async function renderizarRanking() {
        const res = await fetch(`${API_BASE_URL}/ranking`);
        const data = await res.json();
        document.getElementById('tabla-ranking-cuerpo').innerHTML = data.map(u => 
            `<div class="py-2 flex justify-between border-b border-slate-700"><span>${u.username}</span><b>${u.puntos} pts</b></div>`).join('');
    }

    function cerrarSesion() {
        localStorage.clear();
        location.reload();
    }

    window.onload = () => usuarioLogueado ? cambiarVista('app') : cambiarVista('login');
</script>
</body>
</html>
